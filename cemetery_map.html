<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Карта кладбища Ждамирово</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; height: 100vh; font-family: Arial, sans-serif; display: flex; flex-direction: column; overflow: hidden; }
        #header {
            background: linear-gradient(135deg, #2c3e50, #34495e);
            color: white; padding: 10px 15px;
            display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
            z-index: 2000; position: relative; flex-shrink: 0;
        }
        #title { font-size: 16px; font-weight: 600; margin: 0; flex-shrink: 0; }
        .search-container { display: flex; gap: 8px; flex: 1; min-width: 250px; }
        .search-input { flex: 1; padding: 8px 12px; border: none; border-radius: 6px; font-size: 14px; }
        .btn-reset { padding: 8px 16px; background: #e74c3c; color: white; border: none; border-radius: 6px; cursor: pointer; }
        #stats { font-size: 13px; white-space: nowrap; opacity: 0.9; }
        #unmapped-results {
            display: none; position: absolute; top: 100%; left: 15px; right: 15px;
            max-width: 500px; max-height: 60vh; overflow-y: auto;
            background: white; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            z-index: 1500; padding: 15px; color: #333; margin-top: 8px;
        }
        .unmapped-header { font-weight: bold; margin-bottom: 10px; font-size: 14px; color: #2c3e50; }
        .unmapped-card { border-bottom: 1px solid #ecf0f1; padding: 12px 0; font-size: 13px; display: flex; gap: 12px; }
        .unmapped-photo { flex-shrink: 0; width: 80px; height: 80px; border-radius: 6px; overflow: hidden; border: 1px solid #ddd; }
        .unmapped-photo img { width: 100%; height: 100%; object-fit: cover; cursor: pointer; }
        .unmapped-info { flex-grow: 1; }
        .unmapped-person { margin-bottom: 4px; }
        .unmapped-name { font-weight: 500; color: #34495e; }
        .unmapped-dates { color: #7f8c8d; font-size: 12px; }
        .unmapped-warning { background: #fff3cd; color: #856404; font-size: 12px; padding: 8px; border-radius: 6px; margin-top: 8px; }
        #map { flex-grow: 1; width: 100%; min-height: 400px; z-index: 1; }
        .leaflet-popup-content { margin: 15px; font-family: 'Courier New', monospace; font-size: 13px; min-width: 280px; }
        .popup-photo { width: 100%; height: 160px; object-fit: cover; border-radius: 6px; margin-bottom: 8px; }
        .popup-header { margin-bottom: 6px; color: #333; }
        .popup-divider { color: #999; margin: 6px 0; letter-spacing: -0.5px; }
        .person-entry { margin-bottom: 8px; }
        .person-name { font-weight: bold; margin-bottom: 2px; }
        .person-dates { margin-left: 12px; color: #555; }
        .action-buttons { margin-top: 8px; display: flex; flex-direction: column; gap: 6px; }
        .action-btn { padding: 8px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; text-decoration: none; text-align: center; }
        .btn-copy { background: #f8f9fa; color: #495057; border: 1px solid #dee2e6; }
        .btn-yandex { background: #ffcc00; color: #000; }
        .btn-google { background: #4285f4; color: white; }
        .btn-neighbors { background: #6c757d; color: white; }
        .btn-neighbors.active { background: #28a745; }
        .neighbors-container { margin-top: 8px; padding-top: 8px; border-top: 1px solid #dee2e6; }
        .neighbor-item { padding: 4px 0; border-bottom: 1px solid #f8f9fa; font-size: 11px; }
        @media (max-width: 600px) {
            #header { flex-direction: column; align-items: stretch; padding: 8px 10px; }
        }
    </style>
</head>

    var map = L.map('map').setView([54.51711763071895, 36.38146339705882], 18);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
        attribution: '© OpenStreetMap contributors © CARTO',
        subdomains: 'abcd',
        maxZoom: 20
    }).addTo(map);

    function createIcon(color, size) {
        return L.divIcon({
            html: '<div style="background:' + color + ';width:' + size + 'px;height:' + size + 'px;border-radius:50%;border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.4);"></div>',
            iconSize: [size, size], iconAnchor: [size/2, size/2], popupAnchor: [0, -(size/2 + 5)]
        });
    }

    var iconSingle = createIcon('#27ae60', 12);
    var iconMultiple = createIcon('#3498db', 16);

    function buildPopup(grave) {
        var lat = grave.latitude.toFixed(6);
        var lon = grave.longitude.toFixed(6);
        // Миниатюра без onclick — не кликабельна
        var html = `<div class="popup-header"><img src="${grave.thumb}" class="popup-photo" alt="Фото"><br>📍 ${lat}, ${lon}</div><div class="popup-divider">─────────────────────────</div>`;
        grave.people.forEach(function(person, idx) {
            var prefix = grave.people.length > 1 ? (idx + 1) + '. ' : '';
            var dateStr = '';
            if (person.birth_date && person.death_date) dateStr = person.birth_date + ' — ' + person.death_date;
            else if (person.birth_date) dateStr = 'р. ' + person.birth_date;
            else if (person.death_date) dateStr = 'ум. ' + person.death_date;
            else dateStr = 'Даты не указаны';
            html += `<div class="person-entry"><div class="person-name">${prefix}${person.full_name}</div><div class="person-dates">📅 ${dateStr}</div></div>`;
        });
        var blockId = 'neighbors-' + grave.filename.replace(/[^a-zA-Z0-9]/g, '');
        html += `<div class="popup-divider">─────────────────────────</div>
            <div class="action-buttons">
                <button class="action-btn btn-copy" onclick="copyCoordinates('${lat}, ${lon}')">📋 Копировать координаты</button>
                <a class="action-btn btn-yandex" href="https://yandex.ru/maps/?pt=${lon},${lat}&z=18&l=map" target="_blank">🟡 Открыть в Яндекс.Картах</a>
                <a class="action-btn btn-google" href="https://www.google.com/maps/search/?api=1&query=${lat},${lon}" target="_blank">🔵 Открыть в Google Картах</a>
                <button class="action-btn btn-neighbors" onclick="showNeighbors(${grave.latitude}, ${grave.longitude}, '${grave.filename}', event)">👥 Соседи (10 м)</button>
            </div>
            <div id="${blockId}" class="neighbors-container" style="display:none;"></div>`;
        return html;
    }

    var mapMarkers = [];
    mappedData.forEach(function(grave) {
        var icon = grave.people_count === 1 ? iconSingle : iconMultiple;
        var marker = L.marker([grave.latitude, grave.longitude], {icon: icon}).addTo(map).bindPopup(buildPopup(grave), {maxWidth: 350});
        marker.graveData = grave;
        mapMarkers.push(marker);
    });

    function performSearch() {
        var query = document.getElementById('searchInput').value.toLowerCase().trim();
        if (query === '') { resetSearch(); return; }
        var foundMapped = 0, foundMappedPeople = 0;
        var visibleMarkers = [];
        mapMarkers.forEach(function(marker) {
            var grave = marker.graveData; var shouldShow = false; var matchCount = 0;
            grave.people.forEach(function(person) {
                var full = person.full_name.toLowerCase();
                var last = (person.last_name || '').toLowerCase();
                var birth = person.birth_date;
                var death = person.death_date;
                if (full.includes(query) || last.includes(query) || birth.includes(query) || death.includes(query)) {
                    shouldShow = true; matchCount++;
                }
            });
            if (shouldShow) {
                if (!map.hasLayer(marker)) marker.addTo(map);
                foundMapped++; foundMappedPeople += matchCount;
                visibleMarkers.push(marker);
            } else {
                if (map.hasLayer(marker)) map.removeLayer(marker);
            }
        });
        var unmappedMatches = [];
        unmappedData.forEach(function(grave) {
            var hasMatch = false;
            grave.people.forEach(function(person) {
                var full = person.full_name.toLowerCase();
                var last = (person.last_name || '').toLowerCase();
                var birth = person.birth_date;
                var death = person.death_date;
                if (full.includes(query) || last.includes(query) || birth.includes(query) || death.includes(query)) hasMatch = true;
            });
            if (hasMatch) unmappedMatches.push(grave);
        });
        var unmappedDiv = document.getElementById('unmapped-results');
        if (unmappedMatches.length > 0) {
            var html = '<div class="unmapped-header">📋 Найдено без координат (' + unmappedMatches.length + '):</div>';
            unmappedMatches.forEach(function(grave) {
                html += '<div class="unmapped-card"><div class="unmapped-photo"><img src="' + grave.filename + '" alt="Фото"></div><div class="unmapped-info">';
                grave.people.forEach(function(person) {
                    var dateStr = (person.birth_date && person.death_date) ? person.birth_date + ' — ' + person.death_date : (person.birth_date ? 'р. ' + person.birth_date : (person.death_date ? 'ум. ' + person.death_date : 'Даты не указаны'));
                    html += '<div class="unmapped-person"><span class="unmapped-name">• ' + person.full_name + '</span> <span class="unmapped-dates">📅 ' + dateStr + '</span></div>';
                });
                html += '<div class="unmapped-warning">📍 Координаты не указаны. Добавьте вручную или проверьте EXIF.</div></div></div>';
            });
            unmappedDiv.innerHTML = html; unmappedDiv.style.display = 'block';
        } else { unmappedDiv.style.display = 'none'; }
        var totalUnmapped = unmappedMatches.reduce((s,g) => s + g.people_count, 0);
        document.getElementById('stats').textContent = `🔍 На карте: ${foundMapped} (${foundMappedPeople} чел.) | Без координат: ${unmappedMatches.length} (${totalUnmapped} чел.)`;
        if (visibleMarkers.length > 0) {
            visibleMarkers.sort(function(a, b) {
                var nameA = a.graveData.people[0].last_name || '';
                var nameB = b.graveData.people[0].last_name || '';
                return nameA.localeCompare(nameB);
            });
            var firstMarker = visibleMarkers[0];
            map.setView([firstMarker.graveData.latitude, firstMarker.graveData.longitude], 19);
            setTimeout(function() { firstMarker.openPopup(); }, 300);
        }
    }

    function resetSearch() {
        document.getElementById('searchInput').value = '';
        mapMarkers.forEach(m => { if (!map.hasLayer(m)) m.addTo(map); });
        document.getElementById('unmapped-results').style.display = 'none';
        document.querySelectorAll('.neighbors-container').forEach(b => b.style.display = 'none');
        document.querySelectorAll('.btn-neighbors.active').forEach(b => { b.textContent = '👥 Соседи (10 м)'; b.classList.remove('active'); });
        document.getElementById('stats').textContent = '📍 17 на карте';
    }

    window.copyCoordinates = function(coords) {
        if (navigator.clipboard) navigator.clipboard.writeText(coords).then(() => alert('Скопировано: ' + coords)).catch(() => fallbackCopy(coords));
        else fallbackCopy(coords);
    };
    function fallbackCopy(text) {
        var ta = document.createElement('textarea'); ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0'; document.body.appendChild(ta); ta.select();
        try { document.execCommand('copy'); alert('Скопировано: ' + text); } catch(e) { alert('Координаты: ' + text); }
        document.body.removeChild(ta);
    }

    window.showNeighbors = function(centerLat, centerLon, currentFilename, evt) {
        var blockId = 'neighbors-' + currentFilename.replace(/[^a-zA-Z0-9]/g, '');
        var block = document.getElementById(blockId); var btn = evt.target;
        if (block.style.display !== 'none') { block.style.display = 'none'; btn.textContent = '👥 Соседи (10 м)'; btn.classList.remove('active'); return; }
        var center = L.latLng(centerLat, centerLon); var neighbors = [];
        mappedData.forEach(function(g) {
            if (g.filename === currentFilename) return;
            var distance = map.distance(center, L.latLng(g.latitude, g.longitude));
            if (distance <= 10) neighbors.push({ grave: g, distance: distance });
        });
        neighbors.sort((a,b) => a.distance - b.distance);
        var html = '<div style="font-weight:bold;margin-bottom:6px;color:#495057;">👥 Соседи в радиусе 10 м:</div>';
        if (neighbors.length === 0) html += '<div style="font-style:italic;color:#6c757d;">Рядом нет других захоронений</div>';
        else neighbors.forEach(n => {
            var names = n.grave.people.map(p => p.full_name).join(', ');
            html += `<div class="neighbor-item"><div style="font-weight:500;">${names}</div><div style="color:#6c757d;">≈ ${n.distance.toFixed(1)} м</div></div>`;
        });
        block.innerHTML = html; block.style.display = 'block'; btn.textContent = '👥 Скрыть соседей'; btn.classList.add('active');
    };

    document.getElementById('searchInput').addEventListener('keypress', e => { if (e.key === 'Enter') performSearch(); });
    console.log('Карта загружена: 17 маркеров, создано: 27.04.2026 20:33');
</script>
